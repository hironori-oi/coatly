# Dependabot 設定（Coatly）
#
# - npm: ルート（リポジトリ root が Next.js アプリそのもの）を週次で監視
# - github-actions: workflow で使う action を月次で監視
# - DEC-033: claude-code-company から独立した Coatly repo 専用の構成
version: 2
updates:
  # ---------------------------------------------------------------
  # Coatly: npm
  # ---------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      next:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      drizzle:
        patterns:
          - "drizzle-*"
          - "@libsql/*"
      radix:
        patterns:
          - "@radix-ui/*"
      dev-deps:
        dependency-type: "development"
        patterns:
          - "@types/*"
          - "eslint*"
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "playwright"
          - "tsx"
          - "typescript"

  # ---------------------------------------------------------------
  # GitHub Actions: workflow で使う action のバージョン
  # ---------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
